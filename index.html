<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="/styles.css">
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
</head>
<body>
<div class="header">
    <h1>Sondage sur le site web Uber Eats</h1>
    <a href="https://www.ubereats.com/"><p>Uber Eats</p></a>
</div>
<p></p>
<a href="https://www.ubereats.com/"><img src="Uber%20Eats%20Front%20Page.png" alt="" width="30%" class="center"></img></a>
<p></p>
<form>
    <label>À première vue, est-ce que la page d'accueil du site est cohérente ?</label><br>
    <input type="text"><br>
    <p></p>
    <label for="yes_no_radio">Est-ce que cette page d'accueil est fonctionnelle ?</label>
    <p>
    <tr>
        <td><input type="radio" name="yes_no">Oui</input></td>
    </tr>
    <p>
    <label>À quel point est-ce que cette interface est intuitive ? Donnez une note sur 10</label><br>
    <select>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="9">10</option>
    </select>
    <p>
    <label>À quel point est-ce que cette interface est efficace ?</label><br>
    <select multiple>
        <option value="very">Très efficace</option>
        <option value="efficace">efficace</option>
        <option value="neutral">Neutre</option>
        <option value="not">Pas efficace</option>
    </select>
    <p>
    <label>Des commentaires ?</label><br>
    <input type="text"><br>
    <p>
    <input type="submit" value="Soumettre">
</form> 
</body>
</html>
