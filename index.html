<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="/styles/styles.css">
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
</head>
<body>
<div class="header">
    <h1>Sondage sur le site web Uber Eats</h1>
    <a href="https://www.ubereats.com/"><p>Uber Eats</p></a>
</div>
<p></p>
<a href="https://www.ubereats.com/"><img src="Uber%20Eats%20Front%20Page.png" alt="" width="30%" class="center"></img></a>
<p></p>
<form>
    <label>À première vue, que pensez-vous des couleurs choisis pour cet interface ?</label><br>
    <input type="text"></input>
    <p></p>
    <label for="yes_no_radio">Est-ce que cette page d'accueil est fonctionnelle ?</label><br>
    <input type="radio" name="yes_no">Oui
    <input type="radio" name="yes_no">Non<br>
    <p>
    <label>Quelles sont les autres applications de livraisons que vous utilisez ? Vous pouvez choisir plus d'une application en appuyant sur la touche CTRL</label><p>
        <select multiple>
            <option value="very">Skip the dishes</option>
            <option value="efficace">Doordash</option>
            <option value="neutral">Autre</option>
            <option value="not">Aucune</option>
        </select>
    <p>
    <label>À quel point est-ce que cette interface est intuitive ? Donnez une note sur 10</label><p>
    <select>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="9">10</option>
    </select>
    <p>
    <label>À quel point est-ce que cette interface est efficace ?</label><p>
    <select>
        <option value="very">Très efficace</option>
        <option value="efficace">Efficace</option>
        <option value="neutral">Neutre</option>
        <option value="not">Pas efficace</option>
    </select>
    <p>
    <label>Quels buts de l'interface usager cette page accomplit-elle le mieux ? Vous pouvez choisir plusieurs buts</label><p>
        <label class="container">Fonctionnement correct
            <input type="checkbox" checked="checked">
            <span class="checkmark"></span>
        </label><br>
        <label class="container">Fiabilité
            <input type="checkbox">
            <span class="checkmark"></span>
        </label><br>
        <label class="container">Efficacité
            <input type="checkbox">
            <span class="checkmark"></span>
        </label><br>
        <label class="container">Cohérence
            <input type="checkbox">
            <span class="checkmark"></span>
        </label><br>
        <label class="container">Utilisabilité
            <input type="checkbox">
            <span class="checkmark"></span>
        </label><br>
        <label class="container">Sécurité et intégrité des données
            <input type="checkbox">
            <span class="checkmark"></span>
        </label><br>
    <p>
    <label>Des commentaires ?</label><br>
    <input type="text"><br>
    <p>
    <input type="submit" value="Soumettre">
</form> 
</body>
</html>
